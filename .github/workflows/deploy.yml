name: Deploy

# CD: al mergear a main, buildea la imagen, la publica en GHCR y hace pull+up
# en el VPS — solo dentro del proyecto Docker "botclo", sin tocar nada más.
on:
  push:
    branches: [main]
  workflow_dispatch: # permite dispararlo a mano desde la pestaña Actions

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/botclo:latest
            ghcr.io/${{ github.repository_owner }}/botclo:${{ github.sha }}
          # Las NEXT_PUBLIC_* se hornean en el build → van como build args.
          build-args: |
            NEXT_PUBLIC_APP_URL=https://botclo.com
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}

  deploy:
    name: Deploy al VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: ¿Hay acceso SSH configurado?
        id: guard
        env:
          HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "$HOST" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; else echo "ok=false" >> "$GITHUB_OUTPUT"; echo "⏭️  Falta VPS_HOST — se omite el deploy por SSH (la imagen igual quedó en GHCR)."; fi

      - name: Pull + up en el VPS (solo proyecto botclo)
        if: steps.guard.outputs.ok == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /docker/botclo
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.vps.yml pull web
            docker compose -f docker-compose.vps.yml up -d
            docker image prune -f
